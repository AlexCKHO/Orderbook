syntax = "proto3";
package orderbook;

enum Side {
  SIDE_UNSPECIFIED = 0;
  BID = 1;
  ASK = 2;
}

enum OrderType {
  ORDERTYPE_UNSPECIFIED = 0;
  LIMIT = 1;
  MARKET = 2;
}

enum CancelRejectReason {
  REASON_UNSPECIFIED = 0;
  ORDER_NOT_FOUND = 1;
}

message OrderRequest {  
  fixed64 client_id = 1;
  fixed64 price = 2;
  fixed64 qty = 3;
  Side side = 4;
  OrderType order_type = 5;
  int64 timestamp = 6;
}

message CancelRequest {
  fixed64 client_id = 1;
  int64 timestamp = 6;
}

message EngineCommand {
  oneof command {
    OrderRequest place_order = 1;
    CancelRequest cancel_order = 2;
  }
}

message EngineBatchCommand {
  repeated EngineCommand commands = 1;
}

message OrderPlaced { 
  fixed64 client_id = 1; 
  fixed64 price = 2; 
  fixed64 qty = 3; 
  Side side = 4; 
}

message TradeExecuted { 
  fixed64 maker_id = 1; 
  fixed64 taker_id = 2; 
  fixed64 price = 3; 
  fixed64 qty = 4;
  int64 timestamp = 5;
  Side taker_side = 6;
  fixed64 trade_id = 7;
}

message OrderCancelled { 
  fixed64 client_id = 1; 
  fixed64 cancelled_qty = 2; 
}

message OrderKilled { 
  fixed64 client_id = 1; 
  fixed64 killed_qty = 2; 
}

message CancelRejected { 
  fixed64 client_id = 1; 
  CancelRejectReason reason = 2; 
}

message MatchEvent {
  oneof event_data {
    OrderPlaced placed = 1;
    TradeExecuted filled = 2;
    OrderCancelled cancelled = 3;
    OrderKilled killed = 4;
    CancelRejected rejected = 5;
  }
}

message OrderBatchResponse {
  bool success = 1;
  string message = 2;
  uint64 queued_count = 3; 
}

message SubscribeRequest {}

service MatchingEngine {
  rpc PlaceBatchStream (stream EngineBatchCommand) returns (stream OrderBatchResponse);
  rpc SubscribeEvents (SubscribeRequest) returns (stream MatchEvent);
}